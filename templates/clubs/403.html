<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', 'Noto Sans', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm text-center p-4">
                    <div class="card-body">
                        <h1 class="display-1 fw-bold text-secondary">403</h1>
                        <h4 class="fw-bold mb-2">Access Denied</h4>
                        <p class="text-muted mb-4">You don't have permission to perform this action. You are a mere mortal.</p>
                        <a href="{% url 'clubs:index' %}" class="btn btn-dark px-4">Back to My Clubs</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
