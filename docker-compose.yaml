services:
  db:
    image: postgres:17.6
    environment:
      POSTGRES_USER: investment_user
      POSTGRES_PASSWORD: investment_pass
      POSTGRES_DB: investment_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investment_user -d investment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_DB_NAME: investment_db
      POSTGRES_DB_USER: investment_user
      POSTGRES_DB_PASSWORD: investment_pass
      POSTGRES_DB_HOST: db
      POSTGRES_DB_PORT: 5432
      DJANGO_ALLOWED_HOSTS: localhost 127.0.0.1
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  db_data:
  static_files:
